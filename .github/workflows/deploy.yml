name: Build & Deploy to GCE

on:
  push:
    branches: [main]

env:
  REGION: us-east1              # GCP region matching VM zone
  AR_REPO: pos-backend          # Artifact Registry repository name
  IMAGE: pos-backend-api        # Docker image name

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:latest

      - name: Deploy to Compute Engine via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            REGION="${{ env.REGION }}"
            PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
            AR_REPO="${{ env.AR_REPO }}"
            IMAGE="${{ env.IMAGE }}"
            FULL_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}:latest"

            # Authenticate Docker with Artifact Registry (uses VM's service account)
            gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

            # Pull the latest image
            docker pull ${FULL_IMAGE}

            # Stop and remove the old container (ignore errors if not running)
            docker stop pos-backend 2>/dev/null || true
            docker rm   pos-backend 2>/dev/null || true

            # Start the new container
            # .env must exist at $HOME/.env on the VM (never commit it)
            docker run -d \
              --name pos-backend \
              --restart unless-stopped \
              -p 5001:5001 \
              --env-file $HOME/.env \
              ${FULL_IMAGE}

            # Remove dangling images to free disk space
            docker image prune -f
